name: ciro_app
description: CIRO — Crisis Intelligence & Response Orchestrator
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_maps_flutter: ^2.9.0
  riverpod: ^2.5.1
  http: ^1.2.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  google_maps_flutter_android: 2.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/ciro_state_initial.json
    - assets/ciro_state_second_crisis.json
    - assets/ciro_state_field_report.json
    - assets/ciro_state_api_failure.json
    - assets/ciro_state_baseline.json
